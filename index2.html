<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="js/jquery-4.0.0.min.js"></script>
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }
      ul {
        list-style: none;
      }
      a {
        color: inherit;
        text-decoration: inherit;
      }

      /*header*/
      header {
        background-color: #ccc;
        position: fixed;
        width: 100%;
      }
      header ul {
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-align: center;
      }
      header ul li {
        width: calc(100% / 4);
      }
      header ul li a {
        width: 100%;
        padding: 1rem 0px;
        display: inline-block;
      }
      header ul li:hover {
        background-color: #000;
        color: #fff;
      }

      /*container*/
      #container {
        width: 100%;
        height: 100vh;
      }
      #container section {
        width: 100%;
        height: 100%;
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
      }
      .page1 {
        background-image: url(img/pic11.jpg);
      }
      .page2 {
        background-image: url(img/pic22.jpg);
      }
      .page3 {
        background-image: url(img/pic33.jpg);
      }
      .page4 {
        background-image: url(img/pic44.jpg);
      }
      #container .page2 ul {
        display: flex;
        z-index: 10;
      }
      /* #container h2 {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
      } */

      /*navi*/
      #navi {
        position: fixed;
        right: 50px;
        top: 50%;
        transform: translateY(-50%);
        /* border: 1px solid red; */
      }
      #navi li {
        width: 5px;
        height: 20px;
        background-color: #fff;
        margin-bottom: 20px;
        position: relative;
        /* border: 1px solid red; */
      }
      #navi li:last-child {
        margin-bottom: 0px;
      }
      #navi li.on {
        background-color: red;
      }
      #navi li span {
        font-size: 0.7rem;
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        display: none;
      }
      #navi li.on span {
        display: block;
      }
      /*page1*/
      .page1 div {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        height: 100%;
      }
      .page1 h2 {
        margin-bottom: 2rem;
        transform: translateY(100px);
        opacity: 0;
        transition: 0.5s;
      }
      .page1 img {
        width: 500px;
        height: 200px;
        object-fit: cover;
        transform: translateY(100px);
        opacity: 0;
        transition: 0.5s;
        transition-delay: 0.4s;
      }
      /*page1  움직임*/
      .page1.on h2 {
        margin-bottom: 2rem;
        transform: translateY(0px);
        opacity: 1;
      }
      .page1.on img {
        transform: translateY(0px);
        opacity: 1;
      }

      /*page2*/
      .page2 img {
        width: 500px;
        height: 200px;
        object-fit: cover;
        transform: translateY(100px);
        opacity: 0;
        transition: 0.5s;
        transition-delay: 0.4s;
      }
    </style>
  </head>
  <body>
    <header>
      <ul>
        <li><a href="#">PAGE1</a></li>
        <li><a href="#">PAGE2</a></li>
        <li><a href="#">PAGE3</a></li>
        <li><a href="#">PAGE4</a></li>
      </ul>
    </header>
    <div id="container">
      <section class="page1">
        <div>
          <h2>PAGE1</h2>
          <img src="img/pic11.jpg" alt="" />
        </div>
      </section>
      <section class="page2">
        <div>
          <h2>PAGE2</h2>
          <img src="img/pic22.jpg" alt="" />
          <ul>
            <h2>변화와 성장을 쌓아온 지난 2년의 이야기</h2>
            <li>
              <img src="img/mc05_img01.png" />
              <p>#꾸전함이 여물다</p>
            </li>
            <li>
              <img src="img/mc05_img02.png" />
              <p>#유연함이 여물다</p>
            </li>
            <li>
              <img src="img/mc05_img03.png" />
              <p>#다양함이 여물다</p>
            </li>
          </ul>
        </div>
      </section>
      <section class="page3">
        <div>
          <h2>PAGE3</h2>
          <img src="img/pic33.jpg" alt="" />
        </div>
      </section>
      <section class="page4">
        <div>
          <h2>PAGE4</h2>
          <img src="img/pic44.jpg" alt="" />
        </div>
      </section>
    </div>

    <ul id="navi">
      <li class="on"><span>page1</span></li>
      <li><span>page2</span></li>
      <li><span>page3</span></li>
      <li><span>page4</span></li>
    </ul>

    <script>
      let page1 = $(".page1").offset().top;
      console.log(page1);
      let page2 = $(".page2").offset().top;
      console.log(page2);
      let page3 = $(".page3").offset().top;
      console.log(page3);
      let page4 = $(".page4").offset().top;
      console.log(page4);
      $("header li").on("click", function () {
        let i = $(this).index();
        // console.log(i);
        let target = $("section").eq(i).offset().top;
        // console.log(target);

        $("html, body").stop().animate({ scrollTop: target });

        $("#navi li").removeClass("on");
        $("#navi li").eq(i).addClass("on");
      });

      $("#navi li").on("click", function () {
        let i = $(this).index();
        console.log(i);
        let target = $("section").eq(i).offset().top;
        // console.log(target);

        $("html, body").stop().animate({ scrollTop: target });

        $("#navi li").removeClass("on");
        $("#navi li").eq(i).addClass("on");
      });

      $(window).on("scroll", function () {
        let scroll = $(window).scrollTop();
        console.log(scroll);
        base = -200;
        if (scroll >= page1 + base && scroll < page2 + base) {
          $("#navi li").removeClass("on");
          $("#navi li").eq(0).addClass("on");
          $("section").removeClass("on");
          $(".page1").addClass("on");
        } else if (scroll >= page2 + base && scroll < page3 + base) {
          $("#navi li").removeClass("on");
          $("#navi li").eq(1).addClass("on");
          $("section").removeClass("on");
          $(".page2").addClass("on");
        } else if (scroll >= page3 + base && scroll < page4 + base) {
          $("#navi li").removeClass("on");
          $("#navi li").eq(2).addClass("on");
          $("section").removeClass("on");
          $(".page3").addClass("on");
        } else if (scroll >= page4 && scroll < page4 + base) {
          $("#navi li").removeClass("on");
          $("#navi li").eq(3).addClass("on");
          $("section").removeClass("on");
          $(".page4").addClass("on");
        }
      });
    </script>
  </body>
</html>
